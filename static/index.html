<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris Battle</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1 class="logo">TETRIS<span>BATTLE</span></h1>
    <div class="lang-switcher">
      <button onclick="setLang('es')" id="btn-es" class="lang-btn active">
        <span class="flag">🇪🇸</span> ES
      </button>
      <button onclick="setLang('en')" id="btn-en" class="lang-btn">
        <span class="flag">🇬🇧</span> EN
      </button>
    </div>
  </header>

  <main class="lobby">
    <div class="card" id="section-create">
      <h2 data-i18n="create_title">Crear partida</h2>
      <p data-i18n="create_desc">Crea una sala y comparte el código con tu rival.</p>
      <input type="text" id="create-name" maxlength="20" placeholder="" data-i18n-placeholder="name_placeholder" />

      <!-- Game options -->
      <div class="game-options">
        <div class="option-row">
          <label for="next-count-select" data-i18n="next_pieces_label">Piezas siguientes:</label>
          <select id="next-count-select">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="4" selected>4</option>
          </select>
        </div>
        <div class="option-row">
          <label for="ghost-toggle" data-i18n="ghost_label">Ghost piece (previsualizar caída)</label>
          <input type="checkbox" id="ghost-toggle" checked class="toggle-check" />
        </div>
      </div>

      <button class="btn-primary" onclick="createRoom()" data-i18n="create_btn">Crear sala</button>

      <div id="room-code-box" class="hidden">
        <p data-i18n="share_code">Comparte este código:</p>
        <div class="code-display" id="code-display"></div>
        <div class="code-actions">
          <button class="btn-icon" onclick="copyCode()" id="btn-copy" data-i18n="copy_code_btn">Copiar</button>
          <button class="btn-icon btn-icon-share" onclick="shareCode()" id="btn-share" data-i18n="share_code_btn">Compartir</button>
        </div>
        <p class="waiting-msg" data-i18n="waiting_opponent">Esperando al rival...</p>
        <div class="spinner"></div>
      </div>
    </div>

    <div class="divider"><span data-i18n="or">o</span></div>

    <div class="card" id="section-join">
      <h2 data-i18n="join_title">Unirse a partida</h2>
      <p data-i18n="join_desc">Introduce el código que te pasó tu rival.</p>
      <input type="text" id="join-name" maxlength="20" placeholder="" data-i18n-placeholder="name_placeholder" />
      <input type="text" id="join-code" maxlength="6" placeholder="ABC123" class="code-input" oninput="this.value=this.value.toUpperCase()" />
      <button class="btn-secondary" onclick="joinRoom()" data-i18n="join_btn">Unirse</button>
    </div>
  </main>

  <div id="toast" class="toast hidden"></div>
  <footer class="app-footer">v0.2.1</footer>

  <script src="/static/i18n.js"></script>
  <script>
    // Read saved lang
    const savedLang = localStorage.getItem('lang') || 'es';
    setLang(savedLang);

    // Restore saved options
    const savedNext = localStorage.getItem('next_count') || '4';
    const savedGhost = localStorage.getItem('ghost_piece') !== 'false';
    document.getElementById('next-count-select').value = savedNext;
    document.getElementById('ghost-toggle').checked = savedGhost;

    // Persist option changes
    document.getElementById('next-count-select').addEventListener('change', function() {
      localStorage.setItem('next_count', this.value);
    });
    document.getElementById('ghost-toggle').addEventListener('change', function() {
      localStorage.setItem('ghost_piece', this.checked ? 'true' : 'false');
    });

    let ws = null;
    let currentCode = '';
    let currentSlot = 1;
    let currentName = '';
    let currentNext = 4;
    let currentGhost = true;

    function setLang(lang) {
      localStorage.setItem('lang', lang);
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (LANG[lang] && LANG[lang][key]) el.textContent = LANG[lang][key];
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.dataset.i18nPlaceholder;
        if (LANG[lang] && LANG[lang][key]) el.placeholder = LANG[lang][key];
      });
      document.getElementById('btn-es').classList.toggle('active', lang === 'es');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    }

    function showToast(msg, type = 'error') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type}`;
      setTimeout(() => t.classList.add('hidden'), 3000);
    }

    async function createRoom() {
      const name = document.getElementById('create-name').value.trim();
      const lang = localStorage.getItem('lang') || 'es';
      if (!name) { showToast(LANG[lang].error_name); return; }

      currentNext  = parseInt(document.getElementById('next-count-select').value);
      currentGhost = document.getElementById('ghost-toggle').checked;
      currentName  = name;
      currentSlot  = 1;

      try {
        const res = await fetch('/api/rooms', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ player_name: name })
        });
        const data = await res.json();
        if (!res.ok) { showToast(data.error || 'Error'); return; }

        currentCode = data.code;
        document.getElementById('code-display').textContent = data.code;
        document.getElementById('room-code-box').classList.remove('hidden');
        document.querySelector('#section-create .btn-primary').disabled = true;
        document.getElementById('create-name').disabled = true;
        document.getElementById('next-count-select').disabled = true;
        document.getElementById('ghost-toggle').disabled = true;

        connectWS(data.code, name, 1);
      } catch (e) {
        showToast('Error de red');
      }
    }

    async function joinRoom() {
      const name = document.getElementById('join-name').value.trim();
      const code = document.getElementById('join-code').value.trim().toUpperCase();
      const lang = localStorage.getItem('lang') || 'es';
      if (!name) { showToast(LANG[lang].error_name); return; }
      if (code.length !== 6) { showToast(LANG[lang].error_code); return; }

      currentName = name;
      currentSlot = 2;
      currentCode = code;
      // Join uses whatever options are in localStorage (or defaults)
      currentNext  = parseInt(localStorage.getItem('next_count') || '4');
      currentGhost = localStorage.getItem('ghost_piece') !== 'false';

      try {
        const res = await fetch(`/api/rooms/${code}`);
        const data = await res.json();
        if (!res.ok) { showToast(LANG[lang].error_room_not_found); return; }
        if (data.state === 'playing' || data.state === 'finished') {
          showToast(LANG[lang].error_room_full); return;
        }
        connectWS(code, name, 2);
      } catch(e) {
        showToast('Error de red');
      }
    }

    function connectWS(code, name, slot) {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/ws/${code}`);

      ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'join', player_name: name }));
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'error') {
          showToast(msg.msg);
          ws.close();
        } else if (msg.type === 'joined') {
          // OK, wait for game_start
        } else if (msg.type === 'game_start') {
          sessionStorage.setItem('room_code', code);
          sessionStorage.setItem('player_name', name);
          sessionStorage.setItem('player_slot', msg.from_slot || slot);
          sessionStorage.setItem('player1', msg.player1);
          sessionStorage.setItem('player2', msg.player2);
          ws.close();
          const ghostParam = currentGhost ? '1' : '0';
          window.location.href = `/game?code=${code}&slot=${slot}&name=${encodeURIComponent(name)}&next=${currentNext}&ghost=${ghostParam}`;
        }
      };

      ws.onerror = () => showToast('WebSocket error');
    }

    // ─── Copy & Share ─────────────────────────────────────────────────────────
    function copyCode() {
      if (!currentCode) return;
      navigator.clipboard.writeText(currentCode).then(() => {
        showToast(t('copied_ok'), 'success');
      }).catch(() => {
        // fallback: select the element text
        const el = document.getElementById('code-display');
        const range = document.createRange();
        range.selectNode(el);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        window.getSelection().removeAllRanges();
        showToast(t('copied_ok'), 'success');
      });
    }

    function shareCode() {
      if (!currentCode) return;
      const lang = localStorage.getItem('lang') || 'es';
      const shareData = {
        title: LANG[lang].share_title,
        text:  `${LANG[lang].share_text} ${currentCode}`,
        url:   window.location.origin
      };
      if (navigator.share) {
        navigator.share(shareData).catch(() => {});
      } else {
        // Fallback: copy the full share text + URL to clipboard
        const text = `${shareData.text}\n${shareData.url}`;
        navigator.clipboard.writeText(text).then(() => {
          showToast(t('copied_ok'), 'success');
        }).catch(() => {});
      }
    }
  </script>
</body>
</html>
